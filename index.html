<!doctype html>
<html lang="ms" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasar Makanan Laut Malaysia</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    .game-bg { background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 30%, #14b8a6 60%, #10b981 100%); }
    .card-surface { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
    .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.36,1.4,0.5,1); }
    @keyframes bounceIn { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
    .money-img-btn {
      min-width: 140px; height: 80px; border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 4px solid white; 
      cursor: pointer; display: flex; align-items: center; justify-content: center; background: white;
    }
    .money-img-btn img { width: 100%; height: 100%; object-fit: contain; }
    .money-note-small { border-radius: 8px; padding: 2px; border: 2px solid transparent; width: 85px; height: 48px; background: white; }
    .money-note-small img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
    .selected-money { border-color: #f59e0b; box-shadow: 0 0 10px rgba(245,158,11,0.6); }
  </style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full game-bg overflow-auto flex flex-col">
   <header class="w-full px-4 pt-3 pb-2 flex items-center justify-between">
    <div class="flex items-center gap-2"><span class="text-3xl">🐟</span><h1 class="text-white font-black text-lg">Pasar Makanan Laut</h1></div>
    <div class="flex items-center gap-2"><span id="star-count" class="text-white font-bold text-sm bg-white/20 rounded-full px-3 py-1">⭐ 0</span></div>
   </header>
   
   <nav class="w-full px-4 pb-2 flex gap-2">
     <button onclick="switchGame(0)" class="flex-1 py-2 rounded-xl font-bold text-sm bg-white text-cyan-700" id="tab0">🪙 Wang</button> 
     <button onclick="switchGame(1)" class="flex-1 py-2 rounded-xl font-bold text-sm bg-white/25 text-white" id="tab1">🔢 Kira</button> 
     <button onclick="switchGame(2)" class="flex-1 py-2 rounded-xl font-bold text-sm bg-white/25 text-white" id="tab2">🛒 Beli</button>
   </nav>

   <main class="flex-1 w-full px-3 pb-3 overflow-auto">
    <section id="game0" class="w-full max-w-lg mx-auto">
     <div class="card-surface rounded-2xl p-5 shadow-xl text-center">
      <p class="font-bold text-gray-700 mb-4 text-lg" id="g0-instruction">Cari wang RM1! 🎯</p>
      <div class="flex flex-wrap justify-center gap-4 mb-6" id="g0-money-container"></div>
      <div id="g0-feedback" class="font-bold text-lg min-h-[2.5rem]"></div>
     </div>
    </section>

    <section id="game1" class="hidden w-full max-w-lg mx-auto">
     <div class="card-surface rounded-2xl p-4 shadow-xl text-center">
      <p class="font-bold text-gray-700 mb-2" id="g1-question">Berapa jumlah...?</p>
      <div id="g1-display" class="flex flex-wrap justify-center gap-2 mb-4 min-h-[100px] items-center"></div>
      <div id="g1-answers" class="flex justify-center gap-3 flex-wrap"></div>
      <div id="g1-feedback" class="font-bold text-lg mt-2 min-h-[2rem]"></div>
     </div>
    </section>

    <section id="game2" class="hidden w-full max-w-lg mx-auto">
     <div class="card-surface rounded-2xl p-4 shadow-xl">
      <div class="bg-amber-500 p-2 mb-3 text-center text-white rounded-t-xl"><p class="font-black">🏪 Gerai Cikgu Hajar</p></div>
      <p id="g2-task" class="text-center font-bold text-gray-700 mb-3 text-sm"></p>
      <div class="grid grid-cols-4 gap-2 mb-3" id="g2-items">
        <button onclick="addToBasket('🐟', 5)" class="p-2 border rounded-xl hover:bg-cyan-50 text-center"><div class="text-3xl">🐟</div><div class="text-xs font-bold">RM5</div></button>
        <button onclick="addToBasket('🦑', 1)" class="p-2 border rounded-xl hover:bg-cyan-50 text-center"><div class="text-3xl">🦑</div><div class="text-xs font-bold">RM1</div></button>
        <button onclick="addToBasket('🦐', 1)" class="p-2 border rounded-xl hover:bg-cyan-50 text-center"><div class="text-3xl">🦐</div><div class="text-xs font-bold">RM1</div></button>
        <button onclick="addToBasket('🦀', 5)" class="p-2 border rounded-xl hover:bg-cyan-50 text-center"><div class="text-3xl">🦀</div><div class="text-xs font-bold">RM5</div></button>
      </div>
      <div class="flex justify-center gap-2 mb-3" id="g2-money"></div>
      <div class="bg-amber-700 p-3 min-h-[60px] flex items-center justify-center gap-2 rounded-b-xl" id="g2-basket"></div>
      <div class="flex justify-center gap-3 mt-3">
        <button onclick="checkPurchase()" class="bg-emerald-500 text-white font-bold py-2 px-8 rounded-xl shadow-md">✅ Bayar</button> 
      </div>
      <div id="g2-feedback" class="text-center mt-2 font-bold min-h-[2rem]"></div>
     </div>
    </section>
   </main>

   <div id="welcome-overlay" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl p-8 text-center bounce-in shadow-2xl">
     <h2 class="font-black text-2xl text-cyan-700 mb-4">Pasar Makanan Laut</h2>
     <button onclick="startGame()" class="bg-cyan-500 text-white font-black py-4 px-12 rounded-2xl shadow-lg">Mula Main!</button>
    </div>
   </div>
  </div>

  <script>
    let totalStars = 0;
    let g0Answer = 0, g1Answer = 0, g0Count = 0;
    let g2Task = {}, g2SelectedTotal = 0, g2SelectedMoney = 0;

    // GAMBAR WANG MENGGUNAKAN PLACEHOLDER UNTUK KESTABILAN (Boleh diganti dengan link gambar sebenar)
    const moneyData = [
      { value: 1, imgSrc: "https://placehold.co/300x150/0000FF/FFFFFF?text=RM1" },
      { value: 5, imgSrc: "https://placehold.co/300x150/008000/FFFFFF?text=RM5" },
      { value: 10, imgSrc: "https://placehold.co/300x150/FF0000/FFFFFF?text=RM10" }
    ];

    function startGame() {
      document.getElementById('welcome-overlay').style.display = 'none';
      newMoneyRound(); newCountingRound(); newShoppingRound();
    }

    function switchGame(idx) {
      [0,1,2].forEach(i => {
        document.getElementById('game' + i).classList.toggle('hidden', i !== idx);
        const tab = document.getElementById('tab' + i);
        tab.className = i === idx ? 'flex-1 py-2 rounded-xl font-bold text-sm bg-white text-cyan-700' : 'flex-1 py-2 rounded-xl font-bold text-sm bg-white/25 text-white';
      });
    }

    function newMoneyRound() {
      const vals = [1, 5, 10];
      g0Answer = vals[g0Count % 3];
      document.getElementById('g0-instruction').textContent = `Cari wang RM${g0Answer}! 🎯`;
      const container = document.getElementById('g0-money-container');
      container.innerHTML = '';
      [...moneyData].sort(() => Math.random() - 0.5).forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'money-img-btn bounce-in';
        btn.onclick = () => {
          if(m.value === g0Answer) {
            document.getElementById('g0-feedback').innerHTML = '<span class="text-green-500">Betul! 🌟</span>';
            totalStars++; updateStars(); g0Count++; setTimeout(newMoneyRound, 1200);
          } else {
            document.getElementById('g0-feedback').innerHTML = '<span class="text-red-500">Cuba lagi!</span>';
          }
        };
        btn.innerHTML = `<img src="${m.imgSrc}" alt="RM${m.value}">`;
        container.appendChild(btn);
      });
    }

    function newCountingRound() {
      const items = ['🐟','🦑','🦐','🦀'];
      g1Answer = Math.floor(Math.random() * 5) + 1;
      const icon = items[Math.floor(Math.random()*4)];
      document.getElementById('g1-display').innerHTML = `<span class="text-5xl">${icon.repeat(g1Answer)}</span>`;
      const ans = document.getElementById('g1-answers');
      ans.innerHTML = '';
      [1,2,3,4,5].forEach(n => {
        ans.innerHTML += `<button onclick="checkG1(${n})" class="w-12 h-12 bg-yellow-400 rounded-full font-bold text-white shadow-md text-xl">${n}</button>`;
      });
    }

    function checkG1(n) {
      if(n === g1Answer) {
        document.getElementById('g1-feedback').innerHTML = '<span class="text-green-500">Pintar! 👍</span>';
        totalStars++; updateStars(); setTimeout(newCountingRound, 1200);
      } else {
        document.getElementById('g1-feedback').innerHTML = '<span class="text-red-500">Salah...</span>';
      }
    }

    function newShoppingRound() {
      const scenarios = [{t:'Beli 1 Sotong', i:'🦑', c:1}, {t:'Beli 1 Ikan', i:'🐟', c:5}, {t:'Beli 1 Ketam', i:'🦀', c:5}];
      g2Task = scenarios[Math.floor(Math.random()*scenarios.length)];
      g2SelectedTotal = 0; g2SelectedMoney = 0;
      document.getElementById('g2-task').textContent = `Cikgu Hajar: "${g2Task.t}"`;
      document.getElementById('g2-basket').innerHTML = '<span class="text-white/50">Bakul Kosong</span>';
      const mny = document.getElementById('g2-money');
      mny.innerHTML = '';
      moneyData.forEach(m => {
        const b = document.createElement('button');
        b.className = 'money-note-small';
        b.onclick = () => {
          document.querySelectorAll('.money-note-small').forEach(x => x.classList.remove('selected-money'));
          b.classList.add('selected-money'); g2SelectedMoney = m.value;
        };
        b.innerHTML = `<img src="${m.imgSrc}">`;
        mny.appendChild(b);
      });
    }

    function addToBasket(icon, price) {
      g2SelectedTotal = price;
      document.getElementById('g2-basket').innerHTML = `<span class="text-4xl animate-bounce">${icon}</span>`;
    }

    function checkPurchase() {
      if(g2SelectedTotal === g2Task.c && g2SelectedMoney === g2Task.c) {
        document.getElementById('g2-feedback').innerHTML = '<span class="text-green-500">Berjaya Bayar! ✅</span>';
        totalStars++; updateStars(); setTimeout(newShoppingRound, 1500);
      } else {
        document.getElementById('g2-feedback').innerHTML = '<span class="text-red-500">Barang atau Wang salah...</span>';
      }
    }

    function updateStars() { document.getElementById('star-count').textContent = `⭐ ${totalStars}`; }
  </script>
 </body>
</html>
